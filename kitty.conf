# ╔═══════════════════════════════════════════════════════╗
# ║   kitty.conf — Dracula Purple                         ║
# ╚═══════════════════════════════════════════════════════╝

# ── Shell ───────────────────────────────────────────────
shell /usr/bin/fish

# ── Fonte ───────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        9.0
disable_ligatures never

# ── Janela & Transparência ──────────────────────────────
background_opacity         0.85
dynamic_background_opacity yes
window_padding_width       12
hide_window_decorations    no

# ── Cursor ──────────────────────────────────────────────
cursor                     #bd93f9
cursor_text_color          #1e1f2e
cursor_shape               block
cursor_blink_interval      0.5
cursor_stop_blinking_after 15.0

# ── Seleção ─────────────────────────────────────────────
selection_foreground  #1e1f2e
selection_background  #bd93f9

# ── Paleta: Dracula Purple ──────────────────────────────
# background levemente mais roxo que o Dracula padrão (#282a36)
foreground  #f8f8f2
background  #1e1f2e

# Preto / Cinza
color0   #21222c
color8   #6272a4

# Vermelho
color1   #ff5555
color9   #ff6e6e

# Verde
color2   #50fa7b
color10  #69ff94

# Amarelo
color3   #f1fa8c
color11  #ffffa5

# Azul → Roxo (cor 4 remapeada para roxo)
color4   #bd93f9
color12  #d6acff

# Magenta / Rosa
color5   #ff79c6
color13  #ff92df

# Ciano
color6   #8be9fd
color14  #a4ffff

# Branco
color7   #f8f8f2
color15  #ffffff

# ── URLs ────────────────────────────────────────────────
detect_urls yes
url_color   #8be9fd
url_style   curly
url_prefixes http https file ftp gemini irc gopher

# ── Tab Bar ─────────────────────────────────────────────
tab_bar_edge               bottom
tab_bar_style              powerline
tab_powerline_style        slanted
tab_bar_min_tabs           1
active_tab_foreground      #1e1f2e
active_tab_background      #bd93f9
active_tab_font_style      bold
inactive_tab_foreground    #6272a4
inactive_tab_background    #21222c
inactive_tab_font_style    normal
tab_bar_background         #12131a
tab_bar_margin_color       #12131a

# ── Bordas de Janela ────────────────────────────────────
window_border_width          1pt
active_window_border_color   #bd93f9
inactive_window_border_color #44475a
draw_minimal_borders         yes

# ── Miscelânea ──────────────────────────────────────────
enable_audio_bell  no
scrollback_lines   10000
